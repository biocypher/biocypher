name: Publish

on:
  release:
    types:
      - published

jobs:
  call-tests_and_code_quality:
    uses: "./.github/workflows/tests_and_code_quality.yaml"
    with:
      ref: refs/tags/${{ github.event.release.tag_name }}

  build_and_deploy_artifact:
    needs: call-tests_and_code_quality
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: 3.9
    environment:
      name: release
      url: https://upload.pypi.org/legacy/
    permissions:
      id-token: write
      contents: read
    steps:
    #----------------------------------------------
    # check-out repo and set-up python and uv
    #----------------------------------------------
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.release.tag_name }}
    - name: Setup Python and uv
      uses: ./.github/actions/setup
    #----------------------------------------------
    #            install dependencies
    #----------------------------------------------
    - name: Install dependencies
      uses: ./.github/actions/install
    #----------------------------------------------
    #             build artifact
    #----------------------------------------------
    - name: Build artifact
      run: uv build
    #----------------------------------------------
    #             upload to PyPi
    #----------------------------------------------
    - name: Publish artifact to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://upload.pypi.org/legacy/
